<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit "{{post.title}}" post </title>
</head>
<body>
    <div class="edit-form">
        <form action="/blog/update_post/{{post.id}}/" method="post">
            {% csrf_token %}
            <label for="post_title">Новое название для поста {{ post.title }}</label>
            <input type="text" name="post_title" placeholder="Вводите..." />
            <button type="submit">Подтвердить</button>
        </form>
    </div>
</body>
</html>
