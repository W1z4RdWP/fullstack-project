<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post {{ post.title }}</title>
    <style>
        /* .post-sidebar{
            display: flex;
        } */

        .post-content{
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 10%;
        }

        .content_box{
            min-width: 500px;
            max-width: 700px;
            min-height: 350px;
            font-size: 1.2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="post-content">
        <div class="post-sidebar">
            <a href="{% url 'blog:get_posts' %}">На главную</a>
            <a href="{% url 'blog:get_posts' %}">На главную</a>
            <a href="{% url 'blog:get_posts' %}">На главную</a>
            <a href="{% url 'blog:get_posts' %}">На главную</a>
        </div>
        <h1>
            {{post.title}}
            {% if post.author %}
             - {{ post.author }}
            {% endif %}
        </h1>
        <div id="content" class="content_box">
            {{post.content}}
        </div>

    </div>
</body>
</html>
